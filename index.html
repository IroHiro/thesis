<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop Suitability & Yield Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="map.html">Crop Map</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faqs.html">FAQs</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>
        Data-Driven Crop Suitability and Yield Prediction for Climate-Adaptive
        Agriculture in Albay using Random Forest and LSTM models
      </h1>
      <p>Your guide to crop suitability and yield forecasting.</p>

      <!-- FORM CARD -->
      <div class="form-card">
        <label for="city">Select Your Municipality/City </label>
        <select id="city">
          <option value="">-- Select Municipality/City --</option>
          <option value="Malinao">Malinao</option>
          <option value="Pioduran">Pio Duran</option>
          <option value="Ligao">Ligao City</option>
          <option value="Polangui">Polangui</option>
          <option value="Oas">Oas</option>
        </select>

        <label for="crop">Select a Crop</label>
        <select id="crop">
          <option value="">-- Select Crop --</option>
          <option value="1">Rice</option>
          <option value="0">Corn</option>
          <option value="Coconut">Banana</option>
        </select>

        <button onclick="predictYield()">Get Prediction</button>

        <div id="loader" style="display: none; margin: 10px auto;" class="spinner"></div>
        <div id="display" style="margin-top: 15px; font-weight: bold; color: white;"></div>
      </div>
    </div>
  </section>

  <script> 
    /**
     * TerraSight Crop Yield Prediction Logic
     * Handles 4-week LSTM sequence generation and Typhoon metric extraction
     */

    // 1. Location Database
    const locationData = {
        "Polangui": { lat: 13.2933, lon: 123.4853, ndvi: 0.74, evi: 0.46 },
        "Oas":      { lat: 13.2583, lon: 123.4967, ndvi: 0.72, evi: 0.44 },
        "Ligao":    { lat: 13.2422, lon: 123.5372, ndvi: 0.71, evi: 0.43 },
        "Pioduran": { lat: 13.0450, lon: 123.4561, ndvi: 0.69, evi: 0.40 },  
        "Malinao":  { lat: 13.4117, lon: 123.7000, ndvi: 0.73, evi: 0.45 }
    };
    
    const API_KEY = 'GMV5K3F5X4R63XB7JXGV8GZHV';
    const RENDER_URL = 'https://crop-yield-api-9c1l.onrender.com/predict';
    
    async function predictYield() {
        const locKey = document.getElementById('city').value;
        const cropEncoded = document.getElementById('crop').value;
        const display = document.getElementById('display');
        const loader = document.getElementById('loader');
    
        if (!locKey || !cropEncoded) {
            alert("Please select both a municipality and a crop.");
            return;
        }
    
        const coords = locationData[locKey];
        loader.style.display = "block";
        display.innerText = "Fetching 28-day weather history...";
    
        try {
            const baseUrl = "https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/";
            
            const today = new Date();
            const pastDate = new Date();
            pastDate.setDate(today.getDate() - 27);
    
            const formatDate = (d) => d.toISOString().split('T')[0];
            const dateRange = `${formatDate(pastDate)}/${formatDate(today)}`;
    
            const weatherUrl = `${baseUrl}${coords.lat},${coords.lon}/${dateRange}?unitGroup=metric&key=${API_KEY}&contentType=json&include=days`;
    
            const weatherRes = await fetch(weatherUrl);
            if (!weatherRes.ok) throw new Error(`Weather API Error: ${weatherRes.status}`);
            
            const weatherJSON = await weatherRes.json();
            const allDays = weatherJSON.days;
    
            // Process 4 Weeks for LSTM
            let rawSequence = [];
            let lastSeason = null;
            let lastDateObj = null;
            
            for (let i = 0; i < 4; i++) {
                const weekBlock = allDays.slice(i * 7, (i * 7) + 7);
    
                const tmax = Math.max(...weekBlock.map(d => d.tempmax));
                const tmin = Math.min(...weekBlock.map(d => d.tempmin));
                const tave = weekBlock.reduce((acc, d) => acc + d.temp, 0) / 7;
                const rain = weekBlock.reduce((acc, d) => acc + d.precip, 0);
                const hum  = weekBlock.reduce((acc, d) => acc + d.humidity, 0) / 7;
                const solar = weekBlock.reduce((acc, d) => acc + d.solarradiation, 0) / 7;
                const wind = weekBlock.reduce((acc, d) => acc + d.windspeed, 0) / 7;
    
                const dateObj = new Date(weekBlock[0].datetime);
                lastDateObj = dateObj;
                lastSeason = getSeason(dateObj);
                
                rawSequence.push([
                    coords.ndvi, coords.evi, 
                    tmax, tmin, tave, rain, hum, solar, wind,
                    dateObj.getFullYear(), getWeekNumber(dateObj), lastSeason
                ]);
            }
    
            // Typhoon Metrics
            const max_wind_kts = Math.max(...allDays.map(d => d.windspeed)) * 0.539957;
            const min_pres_mb = Math.min(...allDays.map(d => d.pressure));
            const duration_hrs = allDays.filter(d => d.windspeed > 63).length * 24; 
            let risk_score = (max_wind_kts > 100) ? 3 : (max_wind_kts > 64 ? 2 : 1);
    
            display.innerText = "Connecting to Prediction Server...";
    
            // Send to Render
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    raw_sequence: rawSequence,
                    crop_encoded: parseInt(cropEncoded),
                    municipality: locKey,
                    season: lastSeason,
                    max_wind: max_wind_kts,
                    min_pres: min_pres_mb,
                    duration: duration_hrs,
                    risk_score: risk_score
                })
            });
    
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server error (${response.status}): ${errorText}`);
            }
    
            const result = await response.json();
            console.log("API Response:", result);
            display.innerText = `Predicted Yield: ${result.yield.toFixed(2)} tons/ha`;
    
        } catch (error) {
            console.error(error);
            display.innerText = "Status: " + error.message;
        } finally {
            loader.style.display = "none";
        }
    }
    
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    
    function getSeason(d) {
        const month = d.getMonth() + 1;
        return (month >= 6 && month <= 12) ? 2 : 1; // 2 for Wet, 1 for Dry
    }
</script>
</body>
</html>
