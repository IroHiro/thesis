<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop Suitability & Yield Prediction</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Additional styles for dual results */
    .results-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .result-card {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      padding: 20px;
      min-width: 250px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .result-card h3 {
      margin: 0 0 10px 0;
      color: #2d6a4f;
    }
    .result-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #1b4332;
    }
    .result-card .unit {
      font-size: 14px;
      color: #666;
    }
    .suitability-High {
      color: #2d6a4f;
    }
    .suitability-Medium {
      color: #f4a261;
    }
    .suitability-Low {
      color: #d62828;
    }
    .probability-bar {
      background: #e9ecef;
      border-radius: 10px;
      height: 20px;
      margin: 10px 0;
      overflow: hidden;
    }
    .probability-fill {
      background: #2d6a4f;
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .probability-text {
      font-size: 12px;
      margin-top: 5px;
    }
    /* LOADER */
    .single-spinner {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }
    
    .spinner-small {
      width: 30px;
      height: 30px;
      border: 4px solid #ccc;
      border-top: 4px solid #8fa163;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .cache-badge {
      font-size: 10px;
      background: #e9ecef;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="map.html">Crop Map</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faqs.html">FAQs</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>
        Data-Driven Crop Suitability and Yield Prediction for Climate-Adaptive
        Agriculture in Albay using Random Forest and LSTM models
      </h1>
      <p>Your guide to crop suitability and yield forecasting.</p>

      <!-- FORM CARD -->
      <div class="form-card">
        <label for="city">Select Your Municipality/City </label>
        <select id="city">
          <option value="">-- Select Municipality/City --</option>
          <option value="Malinao">Malinao</option>
          <option value="Pioduran">Pio Duran</option>
          <option value="Ligao">Ligao City</option>
          <option value="Polangui">Polangui</option>
          <option value="Oas">Oas</option>
        </select>

        <label for="crop">Select a Crop</label>
        <select id="crop">
          <option value="">-- Select Crop --</option>
          <option value="rice">Rice</option>
          <option value="corn">Corn</option>
        </select>

        <button onclick="predictBoth()">Get Complete Prediction</button>

       <!-- Single Loader -->
        <div class="single-spinner" id="dualLoader" style="display: none;">
        <div class="spinner-small"></div>
        </div>

        <!-- Results Display -->
        <div id="results" style="margin-top: 20px;"></div>
      </div>
    </div>
  </section>

  <script>
    // ============================================
    // CONFIGURATION - USING YOUR RULE-BASED API
    // ============================================
    
    // NEW: Single API that handles everything
    const RULE_BASED_API_URL = 'https://rule-based-crop-api.onrender.com/predict';
    const WEATHER_API_KEY = 'FMDQ3KEZ3BUFNDGYXKFYYZ8L7';
    
    // Cache expiration time (1 week in milliseconds)
    const CACHE_EXPIRY = 7 * 24 * 60 * 60 * 1000;
    // Cool down for Cache Climate API
    let isInCooldown = false;
    let cooldownTimer = null;

    
    // Location database with NDVI, EVI, and soil fertility
    const locationData = {
        "Polangui": { lat: 13.2933, lon: 123.4853, ndvi: 0.74, evi: 0.46, soil_fertility: 3.2 },
        "Oas":      { lat: 13.2583, lon: 123.4967, ndvi: 0.72, evi: 0.44, soil_fertility: 3.0 },
        "Ligao":    { lat: 13.2422, lon: 123.5372, ndvi: 0.71, evi: 0.43, soil_fertility: 3.5 },
        "Pioduran": { lat: 13.0450, lon: 123.4561, ndvi: 0.69, evi: 0.40, soil_fertility: 2.8 },
        "Malinao":  { lat: 13.4117, lon: 123.7000, ndvi: 0.73, evi: 0.45, soil_fertility: 3.1 }
    };
    
    // ============================================
    // CACHED WEATHER DATA FETCHING (WITH 429 HANDLING)
    // ============================================
    
    async function fetchWeatherData(lat, lon, municipality) {
        // Check cooldown first
        if (isInCooldown) {
            console.log("⏳ In cooldown mode, using cache only...");
            const cached = sessionStorage.getItem(`weather_${municipality}`);
            if (cached) {
                const cachedData = JSON.parse(cached);
                console.log("📦 Returning cached data during cooldown");
                return cachedData.data;
            }
            throw new Error("Rate limited and no cache available. Please try again later.");
        }
        
        // Check sessionStorage cache first
        const cacheKey = `weather_${municipality}`;
        const cached = sessionStorage.getItem(cacheKey);
        
        if (cached) {
            const cachedData = JSON.parse(cached);
            const cacheAge = Date.now() - cachedData.timestamp;
            
            if (cacheAge < CACHE_EXPIRY) {
                console.log(`✅ Using cached weather data for ${municipality} (${Math.round(cacheAge / 1000)} seconds old)`);
                
                // Add cache indicator to results
                const resultsDiv = document.getElementById('results');
                if (resultsDiv) {
                    const cacheIndicator = document.createElement('div');
                    cacheIndicator.className = 'cache-badge';
                    cacheIndicator.textContent = '📦 Using cached weather data';
                    cacheIndicator.style.marginTop = '10px';
                    // Remove old indicator if exists
                    const oldIndicator = document.querySelector('.cache-badge');
                    if (oldIndicator) oldIndicator.remove();
                }
                
                return cachedData.data;
            } else {
                console.log(`⏰ Cache expired for ${municipality}, fetching fresh data...`);
                sessionStorage.removeItem(cacheKey);
            }
        }
        
        console.log(`🌤️ Fetching fresh weather data for ${municipality}...`);
        
        const today = new Date();
        const pastDate = new Date();
        pastDate.setDate(today.getDate() - 27);
        
        const formatDate = (d) => d.toISOString().split('T')[0];
        const dateRange = `${formatDate(pastDate)}/${formatDate(today)}`;
        
        const weatherUrl = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${lat},${lon}/${dateRange}?unitGroup=metric&key=${WEATHER_API_KEY}&contentType=json&include=days`;
        
        try {
            const weatherRes = await fetch(weatherUrl);
            
            // Handle 429 Rate Limit
            if (weatherRes.status === 429) {
                console.log("🚫 Rate limit hit! Entering 15-minute cooldown...");
                isInCooldown = true;
                
                // Reset cooldown after 15 minutes
                if (cooldownTimer) clearTimeout(cooldownTimer);
                cooldownTimer = setTimeout(() => {
                    console.log("✅ Cooldown ended. Requests allowed again.");
                    isInCooldown = false;
                }, 15 * 60 * 1000); // 15 minutes
                
                // Try to return cached data if available
                const cachedData = sessionStorage.getItem(cacheKey);
                if (cachedData) {
                    console.log("📦 Returning cached data during cooldown");
                    return JSON.parse(cachedData).data;
                }
                throw new Error("Rate limit reached. Please wait 15 minutes or try tomorrow.");
            }
            
            if (!weatherRes.ok) throw new Error(`Weather API Error: ${weatherRes.status}`);
            
            const weatherJSON = await weatherRes.json();
            const allDays = weatherJSON.days;
            
            // Calculate averages for suitability API
            let totalTemp = 0;
            let totalRainfall = 0;
            let maxWind = 0;
            let minPressure = Infinity;
            
            for (const day of allDays) {
                totalTemp += day.temp;
                totalRainfall += day.precip;
                maxWind = Math.max(maxWind, day.windspeed);
                minPressure = Math.min(minPressure, day.pressure);
            }
            
            const avgTemp = totalTemp / allDays.length;
            const maxWindKts = maxWind * 0.539957;
            
            const result = {
                allDays: allDays,
                avgTemperature: avgTemp,
                totalRainfall: totalRainfall,
                maxWindKts: maxWindKts,
                minPressure: minPressure
            };
            
            // Store in sessionStorage with timestamp
            sessionStorage.setItem(cacheKey, JSON.stringify({
                data: result,
                timestamp: Date.now()
            }));
            
            console.log(`💾 Cached weather data for ${municipality}`);
            
            return result;
            
        } catch (error) {
            console.error("Weather fetch error:", error);
            throw error;
        }
    }
    
    // ============================================
    // WEEKLY AVERAGES FOR SUITABILITY
    // ============================================
    
    function calculateWeeklyAverages(allDays) {
        const weeklyAverages = [];
        
        for (let i = 0; i < 4; i++) {
            const weekBlock = allDays.slice(i * 7, (i * 7) + 7);
            if (weekBlock.length === 0) break;
            
            const tave = weekBlock.reduce((acc, d) => acc + d.temp, 0) / weekBlock.length;
            const rain = weekBlock.reduce((acc, d) => acc + d.precip, 0);
            
            weeklyAverages.push({
                temperature: tave,
                rainfall: rain
            });
        }
        
        return weeklyAverages;
    }
    
    // ============================================
    // MAIN PREDICTION FUNCTION - NOW USES RULE-BASED API
    // ============================================
    
    async function predictBoth() {
        const locKey = document.getElementById('city').value;
        const cropType = document.getElementById('crop').value;
        const resultsDiv = document.getElementById('results');
        const loaderDiv = document.getElementById('dualLoader');
        
        if (!locKey || !cropType) {
            alert("Please select both a municipality and a crop.");
            return;
        }
        
        // Fix municipality name for API (Pioduran -> Pio Duran)
        let municipalityName = locKey;
        if (locKey === "Pioduran") municipalityName = "Pio Duran";
        if (locKey === "Ligao") municipalityName = "Ligao";
        
        const coords = locationData[locKey];
        
        // Show loader
        loaderDiv.style.display = "flex";
        resultsDiv.innerHTML = "";
        
        // Remove any old cache indicator
        const oldIndicator = document.querySelector('.cache-badge');
        if (oldIndicator) oldIndicator.remove();
        
        try {
            // 1. Fetch weather data (uses cache if available)
            const weatherData = await fetchWeatherData(coords.lat, coords.lon, municipalityName);
            
            // 2. Calculate weekly averages
            const weeklyAverages = calculateWeeklyAverages(weatherData.allDays);
            
            // Calculate averages for the API
            let totalTemp = 0;
            let totalRainfall = 0;
            for (const week of weeklyAverages) {
                totalTemp += week.temperature;
                totalRainfall += week.rainfall;
            }
            const avgTemperature = totalTemp / weeklyAverages.length;
            
            // 3. Call YOUR Rule-Based API (single call instead of two)
            const requestBody = {
                crop: cropType,
                municipality: municipalityName,
                avg_temperature: avgTemperature,
                total_rainfall: totalRainfall,
                humidity: 75,
                ndvi: coords.ndvi,
                evi: coords.evi,
                soil_fertility: coords.soil_fertility,
                n_score: 3,
                p_score: 3,
                k_score: 3
            };
            
            console.log("Calling Rule-Based API:", RULE_BASED_API_URL);
            console.log("Request body:", requestBody);
            
            const response = await fetch(RULE_BASED_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Rule-Based API error (${response.status}): ${errorText}`);
            }
            
            const result = await response.json();
            console.log("API Response:", result);
            
            // 4. Display results
            displayResults(result, cropType, municipalityName);
            
        } catch (error) {
            console.error("Prediction error:", error);
            resultsDiv.innerHTML = `
                <div class="result-card" style="background: rgba(255,255,255,0.95);">
                    <h3>Error</h3>
                    <div class="value" style="color: red;">${error.message}</div>
                    <p>Please try again later.</p>
                    <p style="font-size: 12px; margin-top: 10px;">API: ${RULE_BASED_API_URL}</p>
                </div>
            `;
        } finally {
            loaderDiv.style.display = "none";
        }
    }
    
    // ============================================
    // DISPLAY RESULTS - UPDATED FOR RULE-BASED API
    // ============================================
    
    function displayResults(result, cropType, municipality) {
        const resultsDiv = document.getElementById('results');
        
        // Extract data from the rule-based API response
        const modelResults = result.model_results || {};
        const calculatedScores = result.calculated_scores || {};
        const recommendations = result.recommendations || {};
        
        const suitability = modelResults.suitability || 'Medium';
        const suitabilityClass = `suitability-${suitability}`;
        
        const suitabilityDisplay = {
            'High': '🌟 Highly Suitable',
            'Medium': '✅ Moderately Suitable',
            'Low': '⚠️ Marginally Suitable'
        }[suitability] || suitability;
        
        let probabilitiesHtml = '';
        if (modelResults.suitability_probabilities) {
            probabilitiesHtml = '<div style="margin-top: 15px;">';
            for (const [level, prob] of Object.entries(modelResults.suitability_probabilities)) {
                probabilitiesHtml += `
                    <div class="probability-bar">
                        <div class="probability-fill" style="width: ${prob}%;"></div>
                    </div>
                    <div class="probability-text">${level}: ${prob}%</div>
                `;
            }
            probabilitiesHtml += '</div>';
        }
        
        // Build recommendations HTML from the rule-based API
        let recommendationsHtml = '';
        
        if (recommendations.overall) {
            recommendationsHtml += `
                <div style="margin-top: 15px; text-align: left; padding-top: 10px; border-top: 1px solid #ddd;">
                    <h4>📋 ${recommendations.overall.status || 'Recommendation'}</h4>
                    <p style="color: ${recommendations.overall.color || '#333'};">${recommendations.overall.message || ''}</p>
                </div>
            `;
        }
        
        if (recommendations.planting_advice) {
            recommendationsHtml += `
                <div style="margin-top: 15px; text-align: left;">
                    <h4>🌱 Planting Advice</h4>
                    <p>${recommendations.planting_advice.message || ''}</p>
                    <p>Conditions: ${recommendations.planting_advice.temperature || '?'}°C, ${recommendations.planting_advice.rainfall || '?'}mm rain</p>
                </div>
            `;
        }
        
        if (recommendations.soil_preparation && recommendations.soil_preparation.length) {
            recommendationsHtml += `
                <div style="margin-top: 15px; text-align: left;">
                    <h4>🛠️ Soil Preparation</h4>
                    ${recommendations.soil_preparation.map(p => `<p>• ${p}</p>`).join('')}
                </div>
            `;
        }
        
        if (recommendations.harvest_advice && recommendations.harvest_advice.length) {
            recommendationsHtml += `
                <div style="margin-top: 15px; text-align: left;">
                    <h4>🌾 Harvest Advice</h4>
                    ${recommendations.harvest_advice.map(h => `<p>• ${h}</p>`).join('')}
                </div>
            `;
        }
        
        if (recommendations.typhoon) {
            recommendationsHtml += `
                <div style="margin-top: 15px; text-align: left;">
                    <h4>🌀 Typhoon Preparedness</h4>
                    <p><strong>Risk Level:</strong> ${recommendations.typhoon.risk_level || 'Unknown'}</p>
                    <p><strong>Risk Months:</strong> ${recommendations.typhoon.risk_months || 'N/A'}</p>
                    ${recommendations.typhoon.advice ? recommendations.typhoon.advice.map(a => `<p>• ${a}</p>`).join('') : ''}
                </div>
            `;
        }
        
        resultsDiv.innerHTML = `
            <div class="results-container">
                <div class="result-card">
                    <h3>🌾 ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} Yield Prediction</h3>
                    <div class="value">${modelResults.predicted_yield_tons ? modelResults.predicted_yield_tons.toFixed(2) : '?'} <span class="unit">tons/ha</span></div>
                    <div class="value" style="font-size: 20px;">(${modelResults.predicted_yield_kg ? modelResults.predicted_yield_kg.toLocaleString() : '?'} kg/ha)</div>
                    <p style="margin-top: 5px;">${calculatedScores.vs_regional_average || ''}</p>
                    <p style="margin-top: 10px;">Location: ${municipality}</p>
                </div>
                
                <div class="result-card">
                    <h3>🌱 ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} Suitability</h3>
                    <div class="value ${suitabilityClass}">${suitabilityDisplay}</div>
                    <p style="margin-top: 5px;">Overall Score: ${calculatedScores.overall_suitability_score || '?'}%</p>
                    <p style="margin-top: 5px;">Climate Match: ${calculatedScores.climate_match_score || '?'}%</p>
                    <p style="margin-top: 5px;">Soil Compatibility: ${calculatedScores.soil_compatibility_score || '?'}%</p>
                    ${modelResults.suitability_confidence ? `<p>Model Confidence: ${modelResults.suitability_confidence}%</p>` : ''}
                    ${probabilitiesHtml}
                </div>
            </div>
            
            <div class="result-card" style="margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
                <h3>📋 Complete Recommendations</h3>
                ${recommendationsHtml || '<p>No recommendations available.</p>'}
            </div>
        `;
        
        // Check if we have a cache indicator
        const cached = sessionStorage.getItem(`weather_${municipality}`);
        if (cached) {
            const cacheData = JSON.parse(cached);
            const cacheAge = Math.round((Date.now() - cacheData.timestamp) / 1000);
            const indicator = document.createElement('div');
            indicator.className = 'cache-badge';
            indicator.textContent = `📦 Weather data cached (${Math.floor(cacheAge / 60)} min ${cacheAge % 60} sec old)`;
            resultsDiv.appendChild(indicator);
        }
    }
    
    // Helper function (kept for compatibility)
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    
    function getSeason(d) {
        const month = d.getMonth() + 1;
        return (month >= 6 && month <= 12) ? 2 : 1;
    }
    
    // For backward compatibility
    async function predictYield() {
        await predictBoth();
    }
  </script>
</body>
</html>
