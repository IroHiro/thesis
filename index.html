<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop Suitability & Yield Prediction</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Additional styles for dual results */
    .results-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .result-card {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      padding: 20px;
      min-width: 250px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .result-card h3 {
      margin: 0 0 10px 0;
      color: #2d6a4f;
    }
    .result-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #1b4332;
    }
    .result-card .unit {
      font-size: 14px;
      color: #666;
    }
    .suitability-Highly {
      color: #2d6a4f;
    }
    .suitability-Moderately {
      color: #f4a261;
    }
    .suitability-Marginally {
      color: #e76f51;
    }
    .suitability-Not {
      color: #d62828;
    }
    .probability-bar {
      background: #e9ecef;
      border-radius: 10px;
      height: 20px;
      margin: 10px 0;
      overflow: hidden;
    }
    .probability-fill {
      background: #2d6a4f;
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .probability-text {
      font-size: 12px;
      margin-top: 5px;
    }
    .dual-spinner {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0;
    }
    .spinner-small {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2d6a4f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="map.html">Crop Map</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faqs.html">FAQs</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>
        Data-Driven Crop Suitability and Yield Prediction for Climate-Adaptive
        Agriculture in Albay using Random Forest and LSTM models
      </h1>
      <p>Your guide to crop suitability and yield forecasting.</p>

      <!-- FORM CARD -->
      <div class="form-card">
        <label for="city">Select Your Municipality/City </label>
        <select id="city">
          <option value="">-- Select Municipality/City --</option>
          <option value="Malinao">Malinao</option>
          <option value="Pioduran">Pio Duran</option>
          <option value="Ligao">Ligao City</option>
          <option value="Polangui">Polangui</option>
          <option value="Oas">Oas</option>
        </select>

        <label for="crop">Select a Crop</label>
        <select id="crop">
          <option value="">-- Select Crop --</option>
          <option value="rice">Rice</option>
          <option value="corn">Corn</option>
        </select>

        <button onclick="predictBoth()">Get Complete Prediction</button>

        <!-- Dual Loaders -->
        <div class="dual-spinner" id="dualLoader" style="display: none;">
          <div class="spinner-small"></div>
          <div class="spinner-small"></div>
        </div>

        <!-- Results Display -->
        <div id="results" style="margin-top: 20px;"></div>
      </div>
    </div>
  </section>

  <script>
    // ============================================
    // CONFIGURATION
    // ============================================
    
    const YIELD_API_URL = 'https://crop-yield-api-9c1l.onrender.com/predict';
    const SUITABILITY_API_URL = 'https://suitability-api.onrender.com/predict';
    const WEATHER_API_KEY = 'GMV5K3F5X4R63XB7JXGV8GZHV';
    
    // Location database with NDVI, EVI, and soil fertility
    const locationData = {
        "Polangui": { lat: 13.2933, lon: 123.4853, ndvi: 0.74, evi: 0.46, soil_fertility: 3.2 },
        "Oas":      { lat: 13.2583, lon: 123.4967, ndvi: 0.72, evi: 0.44, soil_fertility: 3.0 },
        "Ligao":    { lat: 13.2422, lon: 123.5372, ndvi: 0.71, evi: 0.43, soil_fertility: 3.5 },
        "Pioduran": { lat: 13.0450, lon: 123.4561, ndvi: 0.69, evi: 0.40, soil_fertility: 2.8 },
        "Malinao":  { lat: 13.4117, lon: 123.7000, ndvi: 0.73, evi: 0.45, soil_fertility: 3.1 }
    };
    
    // ============================================
    // MAIN PREDICTION FUNCTION
    // ============================================
    
    async function predictBoth() {
        const locKey = document.getElementById('city').value;
        const cropType = document.getElementById('crop').value;
        const resultsDiv = document.getElementById('results');
        const loaderDiv = document.getElementById('dualLoader');
        
        if (!locKey || !cropType) {
            alert("Please select both a municipality and a crop.");
            return;
        }
        
        const coords = locationData[locKey];
        
        // Show loader
        loaderDiv.style.display = "flex";
        resultsDiv.innerHTML = "";
        
        try {
            // 1. Fetch weather data
            const weatherData = await fetchWeatherData(coords.lat, coords.lon);
            
            // 2. Calculate weekly averages for suitability API
            const weeklyAverages = calculateWeeklyAverages(weatherData.allDays);
            
            // 3. Call both APIs in parallel
            const [yieldResult, suitabilityResult] = await Promise.all([
                callYieldAPI(locKey, cropType, weatherData, coords),
                callSuitabilityAPI(cropType, weeklyAverages, coords)
            ]);
            
            // 4. Display both results
            displayResults(yieldResult, suitabilityResult, cropType, locKey);
            
        } catch (error) {
            console.error("Prediction error:", error);
            resultsDiv.innerHTML = `
                <div class="result-card" style="background: rgba(255,255,255,0.95);">
                    <h3>Error</h3>
                    <div class="value" style="color: red;">${error.message}</div>
                    <p>Please try again later.</p>
                </div>
            `;
        } finally {
            loaderDiv.style.display = "none";
        }
    }
    
    // ============================================
    // WEATHER DATA FETCHING
    // ============================================
    
    async function fetchWeatherData(lat, lon) {
        const today = new Date();
        const pastDate = new Date();
        pastDate.setDate(today.getDate() - 27);
        
        const formatDate = (d) => d.toISOString().split('T')[0];
        const dateRange = `${formatDate(pastDate)}/${formatDate(today)}`;
        
        const weatherUrl = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${lat},${lon}/${dateRange}?unitGroup=metric&key=${WEATHER_API_KEY}&contentType=json&include=days`;
        
        const weatherRes = await fetch(weatherUrl);
        if (!weatherRes.ok) throw new Error(`Weather API Error: ${weatherRes.status}`);
        
        const weatherJSON = await weatherRes.json();
        const allDays = weatherJSON.days;
        
        // Calculate average temperature and total rainfall for suitability
        let totalTemp = 0;
        let totalRainfall = 0;
        let maxWind = 0;
        let minPressure = Infinity;
        
        for (const day of allDays) {
            totalTemp += day.temp;
            totalRainfall += day.precip;
            maxWind = Math.max(maxWind, day.windspeed);
            minPressure = Math.min(minPressure, day.pressure);
        }
        
        const avgTemp = totalTemp / allDays.length;
        const maxWindKts = maxWind * 0.539957;
        
        return {
            allDays: allDays,
            avgTemperature: avgTemp,
            totalRainfall: totalRainfall,
            maxWindKts: maxWindKts,
            minPressure: minPressure
        };
    }
    
    // ============================================
    // WEEKLY AVERAGES FOR SUITABILITY
    // ============================================
    
    function calculateWeeklyAverages(allDays) {
        // Calculate weekly averages (4 weeks)
        const weeklyAverages = [];
        
        for (let i = 0; i < 4; i++) {
            const weekBlock = allDays.slice(i * 7, (i * 7) + 7);
            if (weekBlock.length === 0) break;
            
            const tave = weekBlock.reduce((acc, d) => acc + d.temp, 0) / weekBlock.length;
            const rain = weekBlock.reduce((acc, d) => acc + d.precip, 0);
            
            weeklyAverages.push({
                temperature: tave,
                rainfall: rain
            });
        }
        
        return weeklyAverages;
    }
    
    // ============================================
    // YIELD API CALL
    // ============================================
    
    async function callYieldAPI(locKey, cropType, weatherData, coords) {
        const allDays = weatherData.allDays;
        let rawSequence = [];
        let lastSeason = null;
        
        // Crop encoding: Rice = 1, Corn = 0
        const cropEncoded = cropType === 'rice' ? 1 : 0;
        
        for (let i = 0; i < 4; i++) {
            const weekBlock = allDays.slice(i * 7, (i * 7) + 7);
            if (weekBlock.length === 0) break;
            
            const tmax = Math.max(...weekBlock.map(d => d.tempmax));
            const tmin = Math.min(...weekBlock.map(d => d.tempmin));
            const tave = weekBlock.reduce((acc, d) => acc + d.temp, 0) / weekBlock.length;
            const rain = weekBlock.reduce((acc, d) => acc + d.precip, 0);
            const hum = weekBlock.reduce((acc, d) => acc + d.humidity, 0) / weekBlock.length;
            const solar = weekBlock.reduce((acc, d) => acc + d.solarradiation, 0) / weekBlock.length;
            const wind = weekBlock.reduce((acc, d) => acc + d.windspeed, 0) / weekBlock.length;
            
            const dateObj = new Date(weekBlock[0].datetime);
            lastSeason = getSeason(dateObj);
            
            rawSequence.push([
                coords.ndvi, coords.evi,
                tmax, tmin, tave, rain, hum, solar, wind,
                dateObj.getFullYear(), getWeekNumber(dateObj), lastSeason
            ]);
        }
        
        // Typhoon metrics
        const duration_hrs = allDays.filter(d => d.windspeed > 63).length * 24;
        let risk_score = (weatherData.maxWindKts > 100) ? 3 : (weatherData.maxWindKts > 64 ? 2 : 1);
        
        const response = await fetch(YIELD_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                raw_sequence: rawSequence,
                crop_encoded: cropEncoded,
                municipality: locKey,
                season: lastSeason,
                max_wind: weatherData.maxWindKts,
                min_pres: weatherData.minPressure,
                duration: duration_hrs,
                risk_score: risk_score
            })
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Yield API error (${response.status}): ${errorText}`);
        }
        
        return await response.json();
    }
    
    // ============================================
    // SUITABILITY API CALL
    // ============================================
    
    async function callSuitabilityAPI(cropType, weeklyAverages, coords) {
        // Use the most recent week's data (or average of all weeks)
        const latestWeek = weeklyAverages[weeklyAverages.length - 1];
        
        // Calculate average temperature and total rainfall across all weeks
        let totalTemp = 0;
        let totalRainfall = 0;
        
        for (const week of weeklyAverages) {
            totalTemp += week.temperature;
            totalRainfall += week.rainfall;
        }
        
        const avgTemperature = totalTemp / weeklyAverages.length;
        const totalRainfallSum = totalRainfall;
        
        const requestBody = {
            crop: cropType,
            ndvi: coords.ndvi,
            evi: coords.evi,
            temperature: avgTemperature,
            rainfall: totalRainfallSum,
            soil_fertility: coords.soil_fertility,
            n_score: 3,  // Default medium
            p_score: 3,  // Default medium
            k_score: 3,  // Default medium
            humidity: 75  // Default humidity
        };
        
        console.log("Suitability API Request:", requestBody);
        
        const response = await fetch(SUITABILITY_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Suitability API error (${response.status}): ${errorText}`);
        }
        
        return await response.json();
    }
    
    // ============================================
    // DISPLAY RESULTS
    // ============================================
    
    function displayResults(yieldResult, suitabilityResult, cropType, municipality) {
        const resultsDiv = document.getElementById('results');
        
        // Determine suitability class for styling
        const suitabilityClass = `suitability-${suitabilityResult.suitability.split(' ')[0]}`;
        
        // Build probabilities HTML if available
        let probabilitiesHtml = '';
        if (suitabilityResult.probabilities) {
            probabilitiesHtml = '<div style="margin-top: 15px;">';
            for (const [level, prob] of Object.entries(suitabilityResult.probabilities)) {
                probabilitiesHtml += `
                    <div class="probability-bar">
                        <div class="probability-fill" style="width: ${prob}%;"></div>
                    </div>
                    <div class="probability-text">${level}: ${prob}%</div>
                `;
            }
            probabilitiesHtml += '</div>';
        }
        
        resultsDiv.innerHTML = `
            <div class="results-container">
                <!-- Yield Prediction Card -->
                <div class="result-card">
                    <h3>🌾 ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} Yield Prediction</h3>
                    <div class="value">${yieldResult.yield.toFixed(2)} <span class="unit">tons/ha</span></div>
                    <p style="margin-top: 10px; color: #666;">Location: ${municipality}</p>
                    ${yieldResult.confidence ? `<p style="font-size: 12px; color: #888;">Confidence: ${yieldResult.confidence}%</p>` : ''}
                </div>
                
                <!-- Suitability Card -->
                <div class="result-card">
                    <h3>🌱 ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} Suitability</h3>
                    <div class="value ${suitabilityClass}">${suitabilityResult.suitability}</div>
                    ${suitabilityResult.confidence ? `<p style="margin-top: 5px;">Confidence: ${suitabilityResult.confidence}%</p>` : ''}
                    ${probabilitiesHtml}
                </div>
            </div>
            
            <!-- Recommendation based on both results -->
            <div class="result-card" style="margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
                <h3>📋 Recommendation</h3>
                ${getRecommendation(cropType, yieldResult.yield, suitabilityResult.suitability)}
            </div>
        `;
    }
    
    function getRecommendation(cropType, yieldValue, suitability) {
        const isHighlySuitable = suitability === 'Highly Suitable' || suitability === 'Moderately Suitable';
        const isGoodYield = yieldValue > 4.0;
        
        if (isHighlySuitable && isGoodYield) {
            return `<p style="color: #2d6a4f;">✅ ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} is highly suitable for this location with good yield potential. Consider expanding cultivation.</p>`;
        } else if (isHighlySuitable && !isGoodYield) {
            return `<p style="color: #f4a261;">⚠️ ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} is suitable but yield is below average. Check farming practices and input management.</p>`;
        } else if (!isHighlySuitable && isGoodYield) {
            return `<p style="color: #f4a261;">⚠️ ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} shows good yield but suitability is low. Monitor crop health closely.</p>`;
        } else {
            return `<p style="color: #d62828;">❌ ${cropType.charAt(0).toUpperCase() + cropType.slice(1)} may not be optimal for this location. Consider alternative crops or soil improvement.</p>`;
        }
    }
    
    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    
    function getSeason(d) {
        const month = d.getMonth() + 1;
        return (month >= 6 && month <= 12) ? 2 : 1; // 2 for Wet, 1 for Dry
    }
    
    // Also keep the original function for backward compatibility
    async function predictYield() {
        await predictBoth();
    }
  </script>
</body>
</html>
