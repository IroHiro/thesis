<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop Suitability & Yield Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="map.html">Crop Map</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faqs.html">FAQs</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>
        Data-Driven Crop Suitability and Yield Prediction for Climate-Adaptive
        Agriculture in Albay using Random Forest and LSTM models
      </h1>
      <p>Your guide to crop suitability and yield forecasting.</p>

      <!-- FORM CARD -->
      <div class="form-card">
        <label for="city">Select Your Municipality/City </label>
        <select id="city">
          <option value="">-- Select Municipality/City --</option>
          <option value="Malinao">Malinao</option>
          <option value="PioDuran">Pio Duran</option>
          <option value="Ligao">Ligao City</option>
          <option value="Polangui">Polangui</option>
          <option value="Oas">Oas</option>
        </select>

        <label for="crop">Select a Crop</label>
        <select id="crop">
          <option value="">-- Select Crop --</option>
          <option value="Rice">Rice</option>
          <option value="Corn">Corn</option>
          <option value="Coconut">Banana</option>
        </select>

        <button onclick="predictYield()">Get Prediction</button>

        <div id="loader" style="display: none; margin: 10px auto;" class="spinner"></div>
        <div id="display" style="margin-top: 15px; font-weight: bold; color: white;"></div>
      </div>
    </div>
  </section>

  <script src="script.js"> 
    /**
     * TerraSight Crop Yield Prediction Logic
     * Handles 4-week LSTM sequence generation and Typhoon metric extraction
     */
    
    // 1. Location Database (Baseline NDVI/EVI and Coordinates for Albay)
    const locationData = {
        "Polangui": { lat: 13.2933, lon: 123.4853, ndvi: 0.74, evi: 0.46 },
        "Oas":      { lat: 13.2583, lon: 123.4967, ndvi: 0.72, evi: 0.44 },
        "Ligao":    { lat: 13.2422, lon: 123.5372, ndvi: 0.71, evi: 0.43 },
        "PioDuran": { lat: 13.0450, lon: 123.4561, ndvi: 0.69, evi: 0.40 },
        "Malinao":  { lat: 13.4117, lon: 123.7000, ndvi: 0.73, evi: 0.45 }
    };
    
    const API_KEY = 'YOUR_VISUAL_CROSSING_KEY'; // Replace with your actual key
    const RENDER_URL = 'https://crop-yield-api.onrender.com/predict';
    
    async function predictYield() {
        const loc = document.getElementById('city').value;
        const cropEncoded = document.getElementById('crop').value;
        const display = document.getElementById('display');
        const loader = document.getElementById('loader');
    
        // Show loading state
        loader.style.display = "block";
        display.innerText = "Fetching weather data and calculating indices...";
    
        try {
            const coords = locationData[loc];
            
            // 2. Fetch 28 days of historical weather data
            const weatherUrl = `https://weather.visualcrossing.com/visual-crossing-weather-api/services/timeline/${coords.lat},${coords.lon}/last28days?unitGroup=metric&include=days&key=${API_KEY}&contentType=json`;
            
            const weatherRes = await fetch(weatherUrl);
            if (!weatherRes.ok) throw new Error("Weather API Error");
            
            const weatherData = await weatherRes.json();
            const allDays = weatherData.days; // 28-day array
    
            // 3. Process 4 Weeks for LSTM (12 features per week)
            let rawSequence = [];
            for (let i = 0; i < 4; i++) {
                const weekBlock = allDays.slice(i * 7, (i * 7) + 7);
    
                // Calculate Weekly Averages/Totals
                const tmax = Math.max(...weekBlock.map(d => d.tempmax));
                const tmin = Math.min(...weekBlock.map(d => d.tempmin));
                const tave = weekBlock.reduce((acc, d) => acc + d.temp, 0) / 7;
                const rain = weekBlock.reduce((acc, d) => acc + d.precip, 0);
                const hum  = weekBlock.reduce((acc, d) => acc + d.humidity, 0) / 7;
                const solar = weekBlock.reduce((acc, d) => acc + d.solarradiation, 0) / 7;
                const wind = weekBlock.reduce((acc, d) => acc + d.windspeed, 0) / 7;
    
                // Date-based features
                const dateObj = new Date(weekBlock[0].datetime);
                const weekNum = getWeekNumber(dateObj);
                const yearNum = dateObj.getFullYear();
                const seasonNum = getSeason(dateObj);
    
                rawSequence.push([
                    coords.ndvi, coords.evi, 
                    tmax, tmin, tave, rain, hum, solar, wind,
                    yearNum, weekNum, seasonNum
                ]);
            }
    
            // 4. Extract Typhoon Metrics for Random Forest (Entire 28-day period)
            const max_wind_kts = Math.max(...allDays.map(d => d.windspeed)) * 0.539957;
            const min_pres_mb = Math.min(...allDays.map(d => d.pressure));
            // Duration: Count hours where wind > 34 knots (Tropical Storm threshold)
            const duration_hrs = allDays.filter(d => d.windspeed > 63).length * 24; 
            
            // Risk Score Logic (Customize this for your thesis)
            let risk_score = 1; // Low
            if (max_wind_kts > 100 || min_pres_mb < 980) risk_score = 3; // High
            else if (max_wind_kts > 64) risk_score = 2; // Medium
    
            // 5. Send to Render Backend
            display.innerText = "Analyzing patterns (Server waking up)...";
            
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    raw_sequence: rawSequence,      // 4x12 for LSTM
                    crop_encoded: parseInt(cropEncoded),
                    max_wind: max_wind_kts,         // Typhoon Metrics for RF
                    min_pres: min_pres_mb,
                    duration: duration_hrs,
                    risk_score: risk_score
                })
            });
    
            if (!response.ok) throw new Error("Prediction Server Error");
    
            const result = await response.json();
            display.innerText = `Predicted Yield: ${result.yield.toFixed(2)} tons/ha`;
    
        } catch (error) {
            console.error(error);
            display.innerText = "Error: " + error.message;
        } finally {
            loader.style.display = "none";
        }
    }
    
    /** * HELPER: Get ISO Week Number
     */
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    
    /** * HELPER: Define Season (1=Dry, 2=Wet) based on Bicol climate
     */
    function getSeason(d) {
        const month = d.getMonth() + 1;
        // June to December is typically the Wet season in Albay
        return (month >= 6 && month <= 12) ? 2 : 1;
    }
    
  </script>
</body>
</html>
